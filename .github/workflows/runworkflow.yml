
name: Deploy Infra, Test API
on:
  push:
    branches:
      - main
jobs:

  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
      
    steps:
    - name: checkout
      run: |
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch --depth=1 origin ${{ github.ref }}
        git checkout FETCH_HEAD

    - name: install-tf
      run: |
        wget https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
        unzip terraform_1.10.0_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version

    - name: init
      id: init
      run: terraform init -upgrade

    - name: plan
      id: plan
      run: terraform plan

    - name: terraform apply
      id: apply
      run: terraform apply -auto-approve

  job-sync-website:
    name: sync website files to s3 bucket
    runs-on: ubuntu-latest
    needs: terraform
    steps:
    - name: checkout
      run: |
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch --depth=1 origin ${{ github.ref }}
        git checkout FETCH_HEAD
    - uses: marcbacchi/cloud-resume-challenge@main
      with:
        args: --acl public-read --follow-symlinks --delete --exclude '.git*/*'
      env:
        AWS_S3_BUCKET: ${{secrets.AWS_S3_BUCKET}}
        AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
        AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
        # AWS_REGION: 'us-east-1'   # optional: defaults to us-east-1
        SOURCE_DIR: 'resume-site'      # optional: defaults to entire repository

  job-smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: job-sync-website
    steps:
      - name: API health check
        run: |
          API_URL="https://d503n28gj5.execute-api.us-east-1.amazonaws.com/"
          response=$(curl -s "$API_URL")
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")

          echo "API Status: $status"
          echo "API Response: $response"

          if [ "$status" != "200" ]; then
            echo "❌ API returned status $status (expected 200)"
            exit 1
          fi

          # Verify response contains valid JSON with count field
          count=$(echo "$response" | grep -o '"count":[0-9]*' | cut -d: -f2)
          if [ -z "$count" ]; then
            echo "❌ API response missing 'count' field"
            exit 1
          fi

          echo "✅ API health check passed (visitor count: $count)"

      - name: Website homepage check
        run: |
          WEBSITE_URL="https://www.marcbacchi.dev"
          status=$(curl -s -o /dev/null -w "%{http_code}" "$WEBSITE_URL")

          echo "Website Status: $status"

          if [ "$status" != "200" ]; then
            echo "❌ Website returned status $status (expected 200)"
            exit 1
          fi

          echo "✅ Website is accessible"

      - name: Website content check
        run: |
          WEBSITE_URL="https://www.marcbacchi.dev"
          response=$(curl -s "$WEBSITE_URL")

          # Check for essential HTML structure
          if ! echo "$response" | grep -q "<!DOCTYPE"; then
            echo "❌ Website missing DOCTYPE"
            exit 1
          fi

          # Check for content (basic smoke test)
          if ! echo "$response" | grep -qi "resume\|projects\|skills\|contact"; then
            echo "⚠️  Warning: Website may be missing expected resume content"
          fi

          echo "✅ Website content check passed"
