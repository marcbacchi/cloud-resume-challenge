
name: Deploy Infra, Test API
on:
  push:
    branches:
      - main
jobs:

  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
      
    steps:
    - name: checkout
      run: |
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch --depth=1 origin ${{ github.ref }}
        git checkout FETCH_HEAD

    - name: install-tf
      run: |
        wget https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
        unzip terraform_1.10.0_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version

    - name: init
      id: init
      run: terraform init -upgrade

    - name: plan
      id: plan
      run: terraform plan

    - name: terraform apply
      id: apply
      run: terraform apply -auto-approve

  job-sync-website:
    name: sync website files to s3 bucket
    runs-on: ubuntu-latest
    needs: terraform
    steps:
    - name: checkout
      run: |
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch --depth=1 origin ${{ github.ref }}
        git checkout FETCH_HEAD
    - uses: marcbacchi/cloud-resume-challenge@main
      with:
        args: --acl public-read --follow-symlinks --delete --exclude '.git*/*'
      env:
        AWS_S3_BUCKET: ${{secrets.AWS_S3_BUCKET}}
        AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
        AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
        # AWS_REGION: 'us-east-1'   # optional: defaults to us-east-1
        SOURCE_DIR: 'resume-site'      # optional: defaults to entire repository

  job-cypress:
    name: Cypress Tests
    runs-on: ubuntu-latest
    needs: job-sync-website
    container: cypress/included:9.5.0
    steps:
      - name: checkout
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.ref }}
          git checkout FETCH_HEAD
      - run: cypress run
